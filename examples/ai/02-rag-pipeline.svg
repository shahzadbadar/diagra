<svg xmlns="http://www.w3.org/2000/svg" width="2396" height="480" viewBox="0 0 2396 480" role="img">
<style>
:root {
  --bg: #0F172A;
  --node-bg: #1E293B;
  --node-border: #334155;
  --node-text: #F1F5F9;
  --edge-color: #475569;
  --edge-label: #CBD5E1;
  --accent: #818CF8;
  --font: 'Inter', sans-serif;
}
.diagra-node { filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.10)); }
.diagra-edge { stroke-linecap: round; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="var(--edge-color)"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="var(--bg)"/>
<g class="diagra-edge-label">
  <path id="edge-1" class="diagra-edge" d="M 172 84 L 352 84" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="205.5" y="64" width="113" height="16" rx="4" fill="var(--bg)" opacity="0.9"/>
  <text x="262" y="76" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Submit Question</text>
