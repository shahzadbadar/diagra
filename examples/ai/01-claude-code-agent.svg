<g class="diagra-edge-label">
  <path id="edge-9" class="diagra-edge" d="M 100 928 C 148 928, 52 128, 100 128" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="67.5" y="602" width="65" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="100" y="612" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Summary</text>
