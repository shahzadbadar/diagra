  <text x="112.5" y="404" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Codebase Reader</text>
</g>
<g id="node-Editor" class="diagra-node" data-icon="generic-server">
