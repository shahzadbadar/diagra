<svg xmlns="http://www.w3.org/2000/svg" width="980" height="1190" viewBox="0 0 980 1190" role="img">
<style>
:root {
  --bg: #0F172A;
  --node-bg: #1E293B;
  --node-border: #334155;
  --node-text: #F1F5F9;
  --edge-color: #475569;
  --edge-label: #CBD5E1;
  --accent: #818CF8;
  --font: 'Inter', sans-serif;
}
.diagra-node { filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.10)); }
.diagra-edge { stroke-linecap: round; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="var(--edge-color)"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="var(--bg)"/>
<text x="24" y="28" font-family="var(--font)" font-size="18" font-weight="700" fill="var(--node-text)">Claude Code Agent Loop</text>
<text x="24" y="50" font-family="var(--font)" font-size="12" font-weight="400" fill="var(--edge-label)">Agentic coding workflow</text>
<line x1="24" y1="58" x2="956" y2="58" stroke="var(--node-border)" stroke-width="0.5"/>
<g transform="translate(0, 70)">
<g class="diagra-edge-label">
  <path id="edge-1" class="diagra-edge" d="M 100 128 C 148 128, 72 188, 120 188" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="67" y="136" width="86" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="110" y="146" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Gives Task</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-2" class="diagra-edge" d="M 120 276 C 168 276, 64.5 336, 112.5 336" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="62.75" y="284" width="107" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="116.25" y="294" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Reads Context</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-3" class="diagra-edge" d="M 112.5 336 C 160.5 336, 72 276, 120 276" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="66.25" y="316" width="100" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="116.25" y="326" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Plan Changes</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-4" class="diagra-edge" d="M 120 276 C 168 276, 52 484, 100 484" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
