<svg xmlns="http://www.w3.org/2000/svg" width="1148" height="400" viewBox="0 0 1148 400" role="img">
<style>
:root {
  --bg: #FFFFFF;
  --node-bg: #F8F9FA;
  --node-border: #0078D4;
  --node-text: #1A202C;
  --edge-color: #0078D4;
  --edge-label: #0078D4;
  --accent: #0078D4;
  --font: 'Inter', sans-serif;
}
.diagra-node { filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.10)); }
.diagra-edge { stroke-linecap: round; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="var(--edge-color)"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="var(--bg)"/>
<path id="edge-1" class="diagra-edge" d="M 172 84 L 352 84" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
<path id="edge-2" class="diagra-edge" d="M 484 84 L 664 84" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
<path id="edge-3" class="diagra-edge" d="M 796 84 L 976 84" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>

<g id="node-frontdoor" class="diagra-node" data-icon="azure-frontdoor">
  <rect x="40" y="40" width="132" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="90" y="52" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Azure Front Door">
  <rect x="4" y="4" width="24" height="24" rx="5" fill="#0078D4"/>
  <circle cx="16" cy="16" r="8.5" fill="#479ee0" opacity="0.9"/><path d="M8 16h16M16 8c2 2.4 3 5 3 8s-1 5.6-3 8M16 8c-2 2.4-3 5-3 8s1 5.6 3 8" stroke="#FFFFFF" stroke-width="1.1" fill="none"/>
  <text x="16" y="20.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">FD</text>
</svg>
  <text x="106" y="108" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Front Door</text>
</g>
<g id="node-apim" class="diagra-node" data-icon="azure-apim">
  <rect x="352" y="40" width="132" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="402" y="52" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Azure API Management">
  <rect x="4" y="4" width="24" height="24" rx="5" fill="#0078D4"/>
  <path d="M7.5 11h17v10h-17z" fill="#479ee0" opacity="0.9"/><path d="M11 16h10" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <text x="16" y="20.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="7" font-weight="700" fill="#FFFFFF">API</text>
</svg>
  <text x="418" y="108" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">API Management</text>
</g>
<g id="node-functions" class="diagra-node" data-icon="azure-functions">
  <rect x="664" y="40" width="132" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="714" y="52" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Azure Functions">
  <rect x="4" y="4" width="24" height="24" rx="5" fill="#0078D4"/>
  <rect x="8" y="8" width="16" height="16" rx="3" fill="#479ee0" opacity="0.95"/><path d="M11 6v4M16 6v4M21 6v4M11 22v4M16 22v4M21 22v4" stroke="#FFFFFF" stroke-width="1.1"/>
  <text x="16" y="20.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">FN</text>
</svg>
  <text x="730" y="108" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Functions</text>
</g>
<g id="node-cosmos" class="diagra-node" data-icon="azure-cosmosdb">
  <rect x="976" y="40" width="132" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="1026" y="52" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Azure Cosmos DB">
  <rect x="4" y="4" width="24" height="24" rx="5" fill="#0078D4"/>
  <ellipse cx="16" cy="9" rx="8.5" ry="3.4" fill="#479ee0"/><path d="M7.5 9v12c0 1.9 3.8 3.4 8.5 3.4s8.5-1.5 8.5-3.4V9" fill="#479ee0"/><path d="M7.5 15c0 1.9 3.8 3.4 8.5 3.4s8.5-1.5 8.5-3.4" stroke="#FFFFFF" stroke-width="1.2" fill="none"/>
  <text x="16" y="20.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="7" font-weight="700" fill="#FFFFFF">CDB</text>
</svg>
  <text x="1042" y="108" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Cosmos DB</text>
</g>
</svg>