<svg xmlns="http://www.w3.org/2000/svg" width="1402" height="960" viewBox="0 0 1402 960" role="img">
<style>
:root {
  --bg: #0F172A;
  --node-bg: #1E293B;
  --node-border: #334155;
  --node-text: #F1F5F9;
  --edge-color: #475569;
  --edge-label: #CBD5E1;
  --accent: #818CF8;
  --font: 'Inter', sans-serif;
}
.diagra-node { filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.10)); }
.diagra-edge { stroke-linecap: round; }
</style>
<defs>
