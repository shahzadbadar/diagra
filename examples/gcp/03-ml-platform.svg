    <path d="M0,0 L0,6 L9,3 z" fill="var(--edge-color)"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="var(--bg)"/>

<g transform="translate(0, 0)">
<g class="diagra-edge-label">
  <path id="edge-1" class="diagra-edge" d="M 162 84 C 280.35 84, 306.65 158, 425 158" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
