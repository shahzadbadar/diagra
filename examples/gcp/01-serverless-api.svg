  <text x="652.5" y="252" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Route Request</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-3" class="diagra-edge" d="M 910 232 C 997.75 232, 1017.25 84, 1105 84" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="952.25" y="136" width="114" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="1009.25" y="146" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Read and Write</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-4" class="diagra-edge" d="M 910 232 L 1105 232" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="957.75" y="274" width="107" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="1011.25" y="284" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Store Objects</text>
