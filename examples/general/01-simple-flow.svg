<svg xmlns="http://www.w3.org/2000/svg" width="1673" height="400" viewBox="0 0 1673 400" role="img">
<style>
:root {
  --bg: #FFFFFF;
  --node-bg: #F8F9FA;
  --node-border: #E2E8F0;
  --node-text: #1A202C;
  --edge-color: #94A3B8;
  --edge-label: #64748B;
  --accent: #6366F1;
  --font: 'Inter', sans-serif;
}
.diagra-node { filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.10)); }
.diagra-edge { stroke-linecap: round; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="var(--edge-color)"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="var(--bg)"/>

<g transform="translate(0, 0)">
<g class="diagra-edge-label">
  <path id="edge-1" class="diagra-edge" d="M 162 84 L 402 84" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="252.5" y="62" width="58" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="281.5" y="72" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Submit</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-2" class="diagra-edge" d="M 522 84 L 764 84" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="613.5" y="94" width="79" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="653" y="104" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Queue Job</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-3" class="diagra-edge" d="M 924 84 L 1126 84" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="973.5" y="126" width="114" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="1030.5" y="136" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Persist Result</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-4" class="diagra-edge" d="M 1308 84 L 1488 84" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="1338.75" y="158" width="100" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="1388.75" y="168" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Read Metrics</text>
</g>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0s" repeatCount="indefinite">
    <mpath href="#edge-1"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.2s" repeatCount="indefinite">
    <mpath href="#edge-2"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.4s" repeatCount="indefinite">
    <mpath href="#edge-3"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.6000000000000001s" repeatCount="indefinite">
    <mpath href="#edge-4"/>
  </animateMotion>
</circle>
<g id="node-Idea" class="diagra-node" data-icon="generic-user">
  <rect x="40" y="40" width="122" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="85" y="52" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="user"><circle cx="16" cy="11" r="6" fill="#64748B"/><path d="M6 28c1.4-6 5-9 10-9s8.6 3 10 9" fill="#64748B"/></svg>

  <text x="101" y="108" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Product Idea</text>
</g>
<g id="node-API" class="diagra-node" data-icon="generic-api">
  <rect x="402" y="40" width="120" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="446" y="52" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="api"><rect x="4" y="7" width="24" height="18" rx="4" fill="#64748B"/><text x="16" y="20" text-anchor="middle" font-family="Arial" font-size="9" font-weight="700" fill="#fff">API</text></svg>

  <text x="462" y="108" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Backend API</text>
</g>
<g id="node-Worker" class="diagra-node" data-icon="generic-server">
  <rect x="764" y="40" width="160" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="828" y="52" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="server"><rect x="5" y="6" width="22" height="20" rx="3" fill="#64748B"/><path d="M9 12h14M9 18h14" stroke="#fff" stroke-width="2"/><circle cx="11" cy="23" r="1.5" fill="#fff"/></svg>

  <text x="844" y="108" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Background Worker</text>
</g>
<g id="node-Database" class="diagra-node" data-icon="generic-database">
  <rect x="1126" y="40" width="182" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="1201" y="52" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="database"><ellipse cx="16" cy="8" rx="10" ry="4" fill="#64748B"/><path d="M6 8v14c0 2.2 4.5 4 10 4s10-1.8 10-4V8" fill="#64748B"/><path d="M6 15c0 2.2 4.5 4 10 4s10-1.8 10-4" stroke="#fff" stroke-width="1.8" fill="none"/></svg>

  <text x="1217" y="108" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Application Database</text>
</g>
<g id="node-Dashboard" class="diagra-node" data-icon="generic-browser">
  <rect x="1488" y="40" width="145" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="1544.5" y="52" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="browser"><rect x="4" y="6" width="24" height="20" rx="3" fill="#64748B"/><path d="M4 12h24" stroke="#fff" stroke-width="2"/><circle cx="9" cy="9" r="1" fill="#fff"/><circle cx="13" cy="9" r="1" fill="#fff"/></svg>

  <text x="1560.5" y="108" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Admin Dashboard</text>
</g>
</g>
</svg>