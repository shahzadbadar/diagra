<svg xmlns="http://www.w3.org/2000/svg" width="2676" height="480" viewBox="0 0 2676 480" role="img">
<style>
:root {
  --bg: #FFFFFF;
  --node-bg: #F8F9FA;
  --node-border: #E2E8F0;
  --node-text: #1A202C;
  --edge-color: #94A3B8;
  --edge-label: #64748B;
  --accent: #6366F1;
  --font: 'Inter', sans-serif;
}
.diagra-node { filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.10)); }
.diagra-edge { stroke-linecap: round; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="var(--edge-color)"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="var(--bg)"/>

<g transform="translate(0, 0)">
<g class="diagra-edge-label">
  <path id="edge-1" class="diagra-edge" d="M 160 158 L 1775 158" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="908" y="136" width="135" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="975.5" y="146" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Enter Credentials</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-2" class="diagra-edge" d="M 1927 158 L 2122 158" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="1963" y="168" width="107" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="2016.5" y="178" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Login Request</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-3" class="diagra-edge" d="M 2242 158 C 2344.15 158, 2366.85 84, 2469 84" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="2278" y="99" width="156" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="2356" y="109" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Validate Credentials</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-4" class="diagra-edge" d="M 2469 84 C 2878.95 84, 1148.05 232, 1558 232" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="1965" y="200" width="93" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="2011.5" y="210" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Lookup User</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-5" class="diagra-edge" d="M 2469 84 L 1548 84" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="1969.5" y="62" width="79" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="2009" y="72" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Issue JWT</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-6" class="diagra-edge" d="M 1548 84 C 1650.15 84, 1672.85 158, 1775 158" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="1619.5" y="227" width="100" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="1669.5" y="237" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Return Token</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-7" class="diagra-edge" d="M 1927 158 L 2122 158" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="1966.5" y="248" width="100" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="2016.5" y="258" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Bearer Token</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-8" class="diagra-edge" d="M 2242 158 C 2344.15 158, 2366.85 232, 2469 232" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="2296.25" y="269" width="142" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="2367.25" y="279" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Authorized Request</text>
</g>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0s" repeatCount="indefinite">
    <mpath href="#edge-1"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.2s" repeatCount="indefinite">
    <mpath href="#edge-2"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.4s" repeatCount="indefinite">
    <mpath href="#edge-3"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.6000000000000001s" repeatCount="indefinite">
    <mpath href="#edge-4"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.8s" repeatCount="indefinite">
    <mpath href="#edge-5"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="1s" repeatCount="indefinite">
    <mpath href="#edge-6"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="1.2000000000000002s" repeatCount="indefinite">
    <mpath href="#edge-7"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="1.4000000000000001s" repeatCount="indefinite">
    <mpath href="#edge-8"/>
  </animateMotion>
</circle>
<g id="node-User" class="diagra-node" data-icon="generic-user">
  <rect x="40" y="114" width="120" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="84" y="126" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="user"><circle cx="16" cy="11" r="6" fill="#64748B"/><path d="M6 28c1.4-6 5-9 10-9s8.6 3 10 9" fill="#64748B"/></svg>

  <text x="100" y="182" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">User Login</text>
</g>
<g id="node-Frontend" class="diagra-node" data-icon="generic-browser">
  <rect x="1775" y="114" width="152" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="1835" y="126" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="browser"><rect x="4" y="6" width="24" height="20" rx="3" fill="#64748B"/><path d="M4 12h24" stroke="#fff" stroke-width="2"/><circle cx="9" cy="9" r="1" fill="#fff"/><circle cx="13" cy="9" r="1" fill="#fff"/></svg>

  <text x="1851" y="182" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Frontend Browser</text>
</g>
<g id="node-Gateway" class="diagra-node" data-icon="generic-api">
  <rect x="2122" y="114" width="120" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="2166" y="126" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="api"><rect x="4" y="7" width="24" height="18" rx="4" fill="#64748B"/><text x="16" y="20" text-anchor="middle" font-family="Arial" font-size="9" font-weight="700" fill="#fff">API</text></svg>

  <text x="2182" y="182" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">API Gateway</text>
</g>
<g id="node-Auth" class="diagra-node" data-icon="generic-server">
  <rect x="2469" y="40" width="122" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="2514" y="52" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="server"><rect x="5" y="6" width="22" height="20" rx="3" fill="#64748B"/><path d="M9 12h14M9 18h14" stroke="#fff" stroke-width="2"/><circle cx="11" cy="23" r="1.5" fill="#fff"/></svg>

  <text x="2530" y="108" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Auth Service</text>
</g>
<g id="node-TokenStore" class="diagra-node" data-icon="generic-database">
  <rect x="1428" y="40" width="120" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="1472" y="52" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="database"><ellipse cx="16" cy="8" rx="10" ry="4" fill="#64748B"/><path d="M6 8v14c0 2.2 4.5 4 10 4s10-1.8 10-4V8" fill="#64748B"/><path d="M6 15c0 2.2 4.5 4 10 4s10-1.8 10-4" stroke="#fff" stroke-width="1.8" fill="none"/></svg>

  <text x="1488" y="108" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Token Store</text>
</g>
<g id="node-UserDB" class="diagra-node" data-icon="generic-database">
  <rect x="1428" y="188" width="130" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="1477" y="200" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="database"><ellipse cx="16" cy="8" rx="10" ry="4" fill="#64748B"/><path d="M6 8v14c0 2.2 4.5 4 10 4s10-1.8 10-4V8" fill="#64748B"/><path d="M6 15c0 2.2 4.5 4 10 4s10-1.8 10-4" stroke="#fff" stroke-width="1.8" fill="none"/></svg>

  <text x="1493" y="256" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">User Database</text>
</g>
<g id="node-Resource" class="diagra-node" data-icon="generic-server">
  <rect x="2469" y="188" width="167" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="2536.5" y="200" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="server"><rect x="5" y="6" width="22" height="20" rx="3" fill="#64748B"/><path d="M9 12h14M9 18h14" stroke="#fff" stroke-width="2"/><circle cx="11" cy="23" r="1.5" fill="#fff"/></svg>

  <text x="2552.5" y="256" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Protected Resource</text>
</g>
</g>
</svg>