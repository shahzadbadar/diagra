  <text x="262" y="367" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Bearer Token</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-8" class="diagra-edge" d="M 106 276 C 154 276, 58 780, 106 780" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="39" y="604" width="134" height="16" rx="4" fill="var(--bg)" opacity="0.9"/>
  <text x="106" y="616" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Authorized Request</text>
</g>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0s" repeatCount="indefinite">
    <mpath href="#edge-1"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.2s" repeatCount="indefinite">
    <mpath href="#edge-2"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.4s" repeatCount="indefinite">
    <mpath href="#edge-3"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.6000000000000001s" repeatCount="indefinite">
    <mpath href="#edge-4"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.8s" repeatCount="indefinite">
    <mpath href="#edge-5"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="1s" repeatCount="indefinite">
    <mpath href="#edge-6"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="1.2000000000000002s" repeatCount="indefinite">
    <mpath href="#edge-7"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="1.4000000000000001s" repeatCount="indefinite">
    <mpath href="#edge-8"/>
  </animateMotion>
</circle>
<g id="node-User" class="diagra-node" data-icon="generic-user">
  <rect x="40" y="40" width="132" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="90" y="52" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="user"><circle cx="16" cy="11" r="6" fill="#64748B"/><path d="M6 28c1.4-6 5-9 10-9s8.6 3 10 9" fill="#64748B"/></svg>

  <text x="106" y="108" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">User Login</text>
</g>
<g id="node-Frontend" class="diagra-node" data-icon="generic-browser">
  <rect x="352" y="410" width="132" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="402" y="422" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="browser"><rect x="4" y="6" width="24" height="20" rx="3" fill="#64748B"/><path d="M4 12h24" stroke="#fff" stroke-width="2"/><circle cx="9" cy="9" r="1" fill="#fff"/><circle cx="13" cy="9" r="1" fill="#fff"/></svg>

  <text x="418" y="478" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Frontend Browser</text>
</g>
<g id="node-Gateway" class="diagra-node" data-icon="generic-api">
  <rect x="40" y="188" width="132" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="90" y="200" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="api"><rect x="4" y="7" width="24" height="18" rx="4" fill="#64748B"/><text x="16" y="20" text-anchor="middle" font-family="Arial" font-size="9" font-weight="700" fill="#fff">API</text></svg>

  <text x="106" y="256" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">API Gateway</text>
</g>
<g id="node-Auth" class="diagra-node" data-icon="generic-server">
  <rect x="40" y="336" width="132" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="90" y="348" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="server"><rect x="5" y="6" width="22" height="20" rx="3" fill="#64748B"/><path d="M9 12h14M9 18h14" stroke="#fff" stroke-width="2"/><circle cx="11" cy="23" r="1.5" fill="#fff"/></svg>

  <text x="106" y="404" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Auth Service</text>
</g>
<g id="node-TokenStore" class="diagra-node" data-icon="generic-database">
  <rect x="40" y="484" width="132" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="90" y="496" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="database"><ellipse cx="16" cy="8" rx="10" ry="4" fill="#64748B"/><path d="M6 8v14c0 2.2 4.5 4 10 4s10-1.8 10-4V8" fill="#64748B"/><path d="M6 15c0 2.2 4.5 4 10 4s10-1.8 10-4" stroke="#fff" stroke-width="1.8" fill="none"/></svg>

  <text x="106" y="552" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Token Store</text>
</g>
<g id="node-UserDB" class="diagra-node" data-icon="generic-database">
  <rect x="40" y="632" width="132" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="90" y="644" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="database"><ellipse cx="16" cy="8" rx="10" ry="4" fill="#64748B"/><path d="M6 8v14c0 2.2 4.5 4 10 4s10-1.8 10-4V8" fill="#64748B"/><path d="M6 15c0 2.2 4.5 4 10 4s10-1.8 10-4" stroke="#fff" stroke-width="1.8" fill="none"/></svg>

  <text x="106" y="700" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">User Database</text>
</g>
<g id="node-Resource" class="diagra-node" data-icon="generic-server">
  <rect x="40" y="780" width="132" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="90" y="792" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="server"><rect x="5" y="6" width="22" height="20" rx="3" fill="#64748B"/><path d="M9 12h14M9 18h14" stroke="#fff" stroke-width="2"/><circle cx="11" cy="23" r="1.5" fill="#fff"/></svg>

  <text x="106" y="848" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Protected Resource</text>
</g>
</svg>