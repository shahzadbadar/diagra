<svg xmlns="http://www.w3.org/2000/svg" width="980" height="1120" viewBox="0 0 980 1120" role="img">
<style>
:root {
  --bg: #FFFFFF;
  --node-bg: #F8F9FA;
  --node-border: #E2E8F0;
  --node-text: #1A202C;
  --edge-color: #94A3B8;
  --edge-label: #64748B;
  --accent: #6366F1;
  --font: 'Inter', sans-serif;
}
.diagra-node { filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.10)); }
.diagra-edge { stroke-linecap: round; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="var(--edge-color)"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="var(--bg)"/>
<g class="diagra-edge-label">
  <path id="edge-1" class="diagra-edge" d="M 106 128 C 246.4 128, 277.6 410, 418 410" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="198.5" y="249" width="127" height="16" rx="4" fill="var(--bg)" opacity="0.9"/>
  <text x="262" y="261" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Enter Credentials</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-2" class="diagra-edge" d="M 352 454 C 433 454, 91 232, 172 232" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="212.5" y="323" width="99" height="16" rx="4" fill="var(--bg)" opacity="0.9"/>
  <text x="262" y="335" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Login Request</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-3" class="diagra-edge" d="M 106 276 C 154 276, 58 336, 106 336" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="32" y="286" width="148" height="16" rx="4" fill="var(--bg)" opacity="0.9"/>
  <text x="106" y="298" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Validate Credentials</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-4" class="diagra-edge" d="M 106 424 C 154 424, 58 632, 106 632" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="63.5" y="572" width="85" height="16" rx="4" fill="var(--bg)" opacity="0.9"/>
  <text x="106" y="584" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Lookup User</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-5" class="diagra-edge" d="M 106 424 C 154 424, 58 484, 106 484" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="70.5" y="434" width="71" height="16" rx="4" fill="var(--bg)" opacity="0.9"/>
  <text x="106" y="446" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Issue JWT</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-6" class="diagra-edge" d="M 172 528 C 253 528, 271 454, 352 454" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="216" y="471" width="92" height="16" rx="4" fill="var(--bg)" opacity="0.9"/>
  <text x="262" y="483" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Return Token</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-7" class="diagra-edge" d="M 352 454 C 433 454, 91 232, 172 232" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
