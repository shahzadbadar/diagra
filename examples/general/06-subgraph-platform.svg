  <rect x="730" y="281" width="100" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="780" y="291" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Emit Metrics</text>
