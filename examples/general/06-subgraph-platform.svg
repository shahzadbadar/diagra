<svg xmlns="http://www.w3.org/2000/svg" width="1962" height="640" viewBox="0 0 1962 640" role="img">
<style>
:root {
  --bg: #0F172A;
  --node-bg: #1E293B;
  --node-border: #334155;
  --node-text: #F1F5F9;
  --edge-color: #475569;
  --edge-label: #CBD5E1;
  --accent: #818CF8;
  --font: 'Inter', sans-serif;
}
.diagra-node { filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.10)); }
.diagra-edge { stroke-linecap: round; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="context-stroke"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="var(--bg)"/>

<g transform="translate(0, 0)">
<g id="subgraph-platform" class="diagra-subgraph">
  <rect x="350" y="8" width="1572" height="478" rx="8" fill="#0F172A" opacity="0.18" stroke="#64748B" stroke-width="1.2" stroke-dasharray="8 6"/>
  <text x="366" y="34" font-family="var(--font)" font-size="12" font-weight="700" fill="#CBD5E1">Production Platform</text>
</g>
<g id="subgraph-ops" class="diagra-subgraph">
  <rect x="690" y="324" width="860" height="162" rx="8" fill="#7C2D12" opacity="0.18" stroke="#FB923C" stroke-width="1.2" stroke-dasharray="8 6"/>
  <text x="706" y="350" font-family="var(--font)" font-size="12" font-weight="700" fill="#FFEDD5">Observability</text>
</g>
<g id="subgraph-processing" class="diagra-subgraph">
