<svg xmlns="http://www.w3.org/2000/svg" width="1650" height="640" viewBox="0 0 1650 640" role="img">
<style>
:root {
  --bg: #0F172A;
  --node-bg: #1E293B;
  --node-border: #334155;
  --node-text: #F1F5F9;
  --edge-color: #475569;
  --edge-label: #CBD5E1;
  --accent: #818CF8;
  --font: 'Inter', sans-serif;
}
.diagra-node { filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.10)); }
.diagra-edge { stroke-linecap: round; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="var(--edge-color)"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="var(--bg)"/>

<g transform="translate(0, 0)">
<g class="diagra-edge-label">
  <path id="edge-1" class="diagra-edge" d="M 160 158 L 402 158" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="263" y="136" width="52" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="289" y="146" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">HTTPS</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-2" class="diagra-edge" d="M 554 158 L 764 158" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="597.25" y="168" width="135" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="664.75" y="178" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Route Web Traffic</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-3" class="diagra-edge" d="M 939 158 L 1126 158" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="993" y="200" width="79" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="1032.5" y="210" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">API Calls</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-4" class="diagra-edge" d="M 1301 158 C 1385.15 158, 1403.85 84, 1488 84" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="1323.75" y="99" width="114" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="1380.75" y="109" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Read and Write</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-5" class="diagra-edge" d="M 1301 158 C 1385.15 158, 1403.85 232, 1488 232" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="1334.75" y="221" width="93" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="1381.25" y="231" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Store Files</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-6" class="diagra-edge" d="M 851.5 202 C 934.525 202, 952.975 372, 1036 372" stroke="var(--edge-color)" stroke-width="1" fill="none" marker-end="url(#arrow)" stroke-dasharray="6 5" opacity="0.4"/>
  <rect x="904.25" y="265" width="79" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="943.75" y="275" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Telemetry</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-7" class="diagra-edge" d="M 1213.5 202 C 1293.375 202, 956.125 372, 1036 372" stroke="var(--edge-color)" stroke-width="1" fill="none" marker-end="url(#arrow)" stroke-dasharray="6 5" opacity="0.4"/>
  <rect x="1053.75" y="297" width="142" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="1124.75" y="307" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Traces and Metrics</text>
</g>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0s" repeatCount="indefinite">
    <mpath href="#edge-1"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.2s" repeatCount="indefinite">
    <mpath href="#edge-2"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.4s" repeatCount="indefinite">
    <mpath href="#edge-3"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.6000000000000001s" repeatCount="indefinite">
    <mpath href="#edge-4"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.8s" repeatCount="indefinite">
    <mpath href="#edge-5"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="1s" repeatCount="indefinite">
    <mpath href="#edge-6"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="1.2000000000000002s" repeatCount="indefinite">
    <mpath href="#edge-7"/>
  </animateMotion>
</circle>
<g id="node-Users" class="diagra-node" data-icon="generic-browser">
  <rect x="40" y="114" width="120" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="84" y="126" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="browser"><rect x="4" y="6" width="24" height="20" rx="3" fill="#64748B"/><path d="M4 12h24" stroke="#fff" stroke-width="2"/><circle cx="9" cy="9" r="1" fill="#fff"/><circle cx="13" cy="9" r="1" fill="#fff"/></svg>

  <text x="100" y="182" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Web Users</text>
</g>
<g id="node-FrontDoor" class="diagra-node" data-icon="azure-frontdoor">
  <rect x="402" y="114" width="152" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="462" y="126" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Azure Front Door">
  <rect x="4" y="4" width="24" height="24" rx="5" fill="#0078D4"/>
  <circle cx="16" cy="16" r="8.5" fill="#479ee0" opacity="0.9"/><path d="M8 16h16M16 8c2 2.4 3 5 3 8s-1 5.6-3 8M16 8c-2 2.4-3 5-3 8s1 5.6 3 8" stroke="#FFFFFF" stroke-width="1.1" fill="none"/>
  <text x="16" y="20.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">FD</text>
</svg>
  <text x="478" y="182" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Azure Front Door</text>
</g>
<g id="node-AppService" class="diagra-node" data-icon="azure-appservice">
  <rect x="764" y="114" width="175" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="835.5" y="126" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Azure App Service">
  <rect x="4" y="4" width="24" height="24" rx="5" fill="#0078D4"/>
  <circle cx="16" cy="16" r="9" fill="#479ee0" opacity="0.9"/>
  <text x="16" y="20.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="7" font-weight="700" fill="#FFFFFF">APP</text>
</svg>
  <text x="851.5" y="182" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">App Service Web App</text>
</g>
<g id="node-Functions" class="diagra-node" data-icon="azure-functions">
  <rect x="1126" y="114" width="175" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="1197.5" y="126" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Azure Functions">
  <rect x="4" y="4" width="24" height="24" rx="5" fill="#0078D4"/>
  <rect x="8" y="8" width="16" height="16" rx="3" fill="#479ee0" opacity="0.95"/><path d="M11 6v4M16 6v4M21 6v4M11 22v4M16 22v4M21 22v4" stroke="#FFFFFF" stroke-width="1.1"/>
  <text x="16" y="20.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">FN</text>
</svg>
  <text x="1213.5" y="182" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Azure Functions API</text>
</g>
<g id="node-Cosmos" class="diagra-node" data-icon="azure-cosmosdb">
  <rect x="1488" y="40" width="120" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="1532" y="52" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Azure Cosmos DB">
  <rect x="4" y="4" width="24" height="24" rx="5" fill="#0078D4"/>
  <ellipse cx="16" cy="9" rx="8.5" ry="3.4" fill="#479ee0"/><path d="M7.5 9v12c0 1.9 3.8 3.4 8.5 3.4s8.5-1.5 8.5-3.4V9" fill="#479ee0"/><path d="M7.5 15c0 1.9 3.8 3.4 8.5 3.4s8.5-1.5 8.5-3.4" stroke="#FFFFFF" stroke-width="1.2" fill="none"/>
  <text x="16" y="20.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="7" font-weight="700" fill="#FFFFFF">CDB</text>
</svg>
  <text x="1548" y="108" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Cosmos DB</text>
</g>
<g id="node-Blob" class="diagra-node" data-icon="azure-blobstorage">
  <rect x="1488" y="188" width="122" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="1533" y="200" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Azure Blob Storage">
  <rect x="4" y="4" width="24" height="24" rx="5" fill="#0078D4"/>
  <path d="M16 6 25 11v10l-9 5-9-5V11l9-5Z" fill="#479ee0" opacity="0.95"/><path d="M10 13h12M10 18h12" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round"/>
  <text x="16" y="20.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="7" font-weight="700" fill="#FFFFFF">BLB</text>
</svg>
  <text x="1549" y="256" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Blob Storage</text>
</g>
<g id="node-Insights" class="diagra-node" data-icon="azure-monitor">
  <rect x="945" y="372" width="182" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="1020" y="384" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Azure Monitor">
  <rect x="4" y="4" width="24" height="24" rx="5" fill="#0078D4"/>
  <path d="M16 6.8 25.2 16 16 25.2 6.8 16 16 6.8Z" fill="#479ee0" opacity="0.95"/><path d="m13 11 6 5-6 5" stroke="#FFFFFF" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="16" y="20.4" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="7" font-weight="700" fill="#FFFFFF">MON</text>
</svg>
  <text x="1036" y="440" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Application Insights</text>
</g>
</g>
</svg>