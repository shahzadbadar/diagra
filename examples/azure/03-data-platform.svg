<svg xmlns="http://www.w3.org/2000/svg" width="980" height="1120" viewBox="0 0 980 1120" role="img">
<style>
:root {
  --bg: #FFFFFF;
  --node-bg: #F8F9FA;
  --node-border: #E2E8F0;
  --node-text: #1A202C;
  --edge-color: #94A3B8;
  --edge-label: #64748B;
  --accent: #6366F1;
  --font: 'Inter', sans-serif;
}
.diagra-node { filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.10)); }
.diagra-edge { stroke-linecap: round; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="var(--edge-color)"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="var(--bg)"/>

<g transform="translate(0, 0)">
<g class="diagra-edge-label">
  <path id="edge-1" class="diagra-edge" d="M 146 146 C 194 146, 75.5 188, 123.5 188" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="60.25" y="156.5" width="149" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="134.75" y="166.5" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Scheduled Ingestion</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-2" class="diagra-edge" d="M 123.5 276 C 171.5 276, 72 336, 120 336" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
