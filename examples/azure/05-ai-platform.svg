<svg xmlns="http://www.w3.org/2000/svg" width="1408" height="960" viewBox="0 0 1408 960" role="img">
<style>
:root {
  --bg: #0F172A;
  --node-bg: #1E293B;
  --node-border: #334155;
  --node-text: #F1F5F9;
  --edge-color: #475569;
  --edge-label: #CBD5E1;
  --accent: #818CF8;
  --font: 'Inter', sans-serif;
}
.diagra-node { filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.10)); }
.diagra-edge { stroke-linecap: round; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="var(--edge-color)"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="var(--bg)"/>

<g transform="translate(0, 0)">
<g class="diagra-edge-label">
  <path id="edge-1" class="diagra-edge" d="M 177 158 C 285 158, 309 232, 417 232" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="247" y="173" width="100" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="297" y="183" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Chat Request</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-2" class="diagra-edge" d="M 554 232 C 662 232, 686 241, 794 241" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="618" y="214.5" width="142" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="689" y="224.5" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Authorized Request</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-3" class="diagra-edge" d="M 237 315 C 657.3 315, 750.7 380, 1171 380" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="630.5" y="325.5" width="121" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="691" y="335.5" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Indexed Content</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-4" class="diagra-edge" d="M 991 241 C 1072 241, 1090 380, 1171 380" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="1004" y="288.5" width="128" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="1068" y="298.5" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Retrieve Context</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-5" class="diagra-edge" d="M 991 241 C 1072 241, 1090 84, 1171 84" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="1002.75" y="140.5" width="149" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="1077.25" y="150.5" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Prompt with Context</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-6" class="diagra-edge" d="M 991 241 L 1171 241" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
