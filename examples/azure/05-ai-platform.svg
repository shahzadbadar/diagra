</g>
<g class="diagra-edge-label">
  <path id="edge-7" class="diagra-edge" d="M 892.5 294 C 962.25 294, 977.75 520, 1047.5 520" stroke="var(--edge-color)" stroke-width="1" fill="none" marker-end="url(#arrow)" stroke-dasharray="6 5" opacity="0.4"/>
  <rect x="930.5" y="380.5" width="79" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="970" y="390.5" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Telemetry</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-8" class="diagra-edge" d="M 1262 128 C 1358.525 128, 950.975 520, 1047.5 520" stroke="var(--edge-color)" stroke-width="1" fill="none" marker-end="url(#arrow)" stroke-dasharray="6 5" opacity="0.4"/>
  <rect x="1101.25" y="430" width="107" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="1154.75" y="440" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Usage Metrics</text>
</g>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0s" repeatCount="indefinite">
    <mpath href="#edge-1"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.2s" repeatCount="indefinite">
    <mpath href="#edge-2"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.4s" repeatCount="indefinite">
    <mpath href="#edge-3"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.6000000000000001s" repeatCount="indefinite">
    <mpath href="#edge-4"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.8s" repeatCount="indefinite">
    <mpath href="#edge-5"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="1s" repeatCount="indefinite">
    <mpath href="#edge-6"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="1.2000000000000002s" repeatCount="indefinite">
    <mpath href="#edge-7"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="1.4000000000000001s" repeatCount="indefinite">
    <mpath href="#edge-8"/>
