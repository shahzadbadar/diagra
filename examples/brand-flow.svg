<svg xmlns="http://www.w3.org/2000/svg" width="980" height="640" viewBox="0 0 980 640" role="img">
<style>
:root {
  --bg: #FFFFFF;
  --node-bg: #F8F9FA;
  --node-border: #FF6B35;
  --node-text: #1A202C;
  --edge-color: #FF6B35;
  --edge-label: #FF6B35;
  --accent: #FF6B35;
  --font: 'Inter', sans-serif;
}
.diagra-node { filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.10)); }
.diagra-edge { stroke-linecap: round; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="var(--edge-color)"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="var(--bg)"/>

<g transform="translate(0, 0)">
<path id="edge-1" class="diagra-edge" d="M 100 128 C 148 128, 52 188, 100 188" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
<path id="edge-2" class="diagra-edge" d="M 100 276 C 148 276, 52 336, 100 336" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
<path id="edge-3" class="diagra-edge" d="M 100 424 C 148 424, 52 484, 100 484" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0s" repeatCount="indefinite">
    <mpath href="#edge-1"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.2s" repeatCount="indefinite">
    <mpath href="#edge-2"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.4s" repeatCount="indefinite">
    <mpath href="#edge-3"/>
  </animateMotion>
</circle>
<g id="node-user" class="diagra-node" data-icon="generic-user">
  <rect x="40" y="40" width="120" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="84" y="52" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="user"><circle cx="16" cy="11" r="6" fill="#64748B"/><path d="M6 28c1.4-6 5-9 10-9s8.6 3 10 9" fill="#64748B"/></svg>

  <text x="100" y="108" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">User</text>
</g>
<g id="node-cloud" class="diagra-node" data-icon="generic-cloud">
  <rect x="40" y="188" width="120" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="84" y="200" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="cloud"><path d="M10 25h14a6 6 0 0 0 0-12 9 9 0 0 0-17-1 6.5 6.5 0 0 0 3 13Z" fill="#64748B"/></svg>

  <text x="100" y="256" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Cloud</text>
</g>
<g id="node-server" class="diagra-node" data-icon="generic-server">
  <rect x="40" y="336" width="120" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="84" y="348" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="server"><rect x="5" y="6" width="22" height="20" rx="3" fill="#64748B"/><path d="M9 12h14M9 18h14" stroke="#fff" stroke-width="2"/><circle cx="11" cy="23" r="1.5" fill="#fff"/></svg>

  <text x="100" y="404" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Server</text>
</g>
<g id="node-data" class="diagra-node" data-icon="generic-database">
  <rect x="40" y="484" width="120" height="88" rx="8" fill="var(--node-bg)" stroke="var(--node-border)"/>
  <svg x="84" y="496" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="database"><ellipse cx="16" cy="8" rx="10" ry="4" fill="#64748B"/><path d="M6 8v14c0 2.2 4.5 4 10 4s10-1.8 10-4V8" fill="#64748B"/><path d="M6 15c0 2.2 4.5 4 10 4s10-1.8 10-4" stroke="#fff" stroke-width="1.8" fill="none"/></svg>

  <text x="100" y="552" text-anchor="middle" font-family="var(--font)" font-size="12" font-weight="600" fill="var(--node-text)">Database</text>
</g>
</g>
</svg>