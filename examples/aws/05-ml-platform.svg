  <text x="1310.75" y="267.5" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Invoke Endpoint</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-8" class="diagra-edge" d="M 1608 158 C 1716 158, 1260 416, 1368 416" stroke="var(--edge-color)" stroke-width="1" fill="none" marker-end="url(#arrow)" stroke-dasharray="6 5" opacity="0.4"/>
  <rect x="1424.25" y="281" width="135" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="1491.75" y="291" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Latency and Drift</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-9" class="diagra-edge" d="M 1036 241 C 1117 241, 1135 416, 1216 416" stroke="var(--edge-color)" stroke-width="1" fill="none" marker-end="url(#arrow)" stroke-dasharray="6 5" opacity="0.4"/>
  <rect x="1050.5" y="306.5" width="121" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="1111" y="316.5" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Errors and Logs</text>
</g>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0s" repeatCount="indefinite">
    <mpath href="#edge-1"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.2s" repeatCount="indefinite">
    <mpath href="#edge-2"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.4s" repeatCount="indefinite">
    <mpath href="#edge-3"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.6000000000000001s" repeatCount="indefinite">
    <mpath href="#edge-4"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="0.8s" repeatCount="indefinite">
    <mpath href="#edge-5"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
