  <text x="574" y="108" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Train Model</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-3" class="diagra-edge" d="M 796 84 C 877 84, 895 158, 976 158" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
