<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="1.4000000000000001s" repeatCount="indefinite">
    <mpath href="#edge-8"/>
  </animateMotion>
</circle>
<circle r="4" fill="var(--accent)" opacity="0.9">
  <animateMotion dur="1.5s" begin="1.6s" repeatCount="indefinite">
    <mpath href="#edge-9"/>
  </animateMotion>
</circle>
