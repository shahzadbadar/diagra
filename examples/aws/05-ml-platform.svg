<svg xmlns="http://www.w3.org/2000/svg" width="1815" height="640" viewBox="0 0 1815 640" role="img">
<style>
:root {
  --bg: #0F172A;
  --node-bg: #1E293B;
  --node-border: #334155;
  --node-text: #F1F5F9;
  --edge-color: #475569;
  --edge-label: #CBD5E1;
  --accent: #818CF8;
  --font: 'Inter', sans-serif;
}
.diagra-node { filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.10)); }
.diagra-edge { stroke-linecap: round; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="var(--edge-color)"/>
  </marker>
</defs>
<rect width="100%" height="100%" fill="var(--bg)"/>

<g transform="translate(0, 0)">
<g class="diagra-edge-label">
  <path id="edge-1" class="diagra-edge" d="M 185 84 L 432 84" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="255.5" y="62" width="121" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="316" y="72" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Upload Features</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-2" class="diagra-edge" d="M 607 84 C 704.65 84, 726.35 93, 824 93" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="674.5" y="82.5" width="93" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="721" y="92.5" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Train Model</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-3" class="diagra-edge" d="M 1021 93 C 1108.75 93, 1128.25 158, 1216 158" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="1050.5" y="103.5" width="121" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="1111" y="113.5" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Write Artifacts</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-4" class="diagra-edge" d="M 1383 158 L 1608 158" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
  <rect x="1445.5" y="136" width="100" height="16" rx="2" fill="var(--bg)" opacity="0.85"/>
  <text x="1495.5" y="146" text-anchor="middle" font-family="var(--font)" font-size="10" font-weight="600" fill="var(--edge-label)">Deploy Model</text>
</g>
<g class="diagra-edge-label">
  <path id="edge-5" class="diagra-edge" d="M 215 232 C 312.65 232, 334.35 241, 432 241" stroke="var(--edge-color)" stroke-width="1.7" fill="none" marker-end="url(#arrow)"/>
